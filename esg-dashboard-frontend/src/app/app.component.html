<div class="app-container">
  <!-- Navigation Header -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <i class="fas fa-chart-line me-2"></i>
        ESG Portfolio Dashboard
      </a>
      <div class="navbar-nav ms-auto">
        <span class="navbar-text">
          <i class="fas fa-circle text-success me-2"></i>
          Live Market Data
        </span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container-fluid mt-4">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3">Loading portfolio data...</p>
    </div>

    <!-- Dashboard Content -->
    <div *ngIf="!isLoading" class="dashboard-content">
      <!-- Portfolio Selector -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">
                <i class="fas fa-briefcase me-2"></i>
                Portfolio Selection
              </h5>
            </div>
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-8">
                  <select class="form-select" [(ngModel)]="selectedPortfolio" 
                          (ngModelChange)="onPortfolioSelect($event)">
                    <option *ngFor="let portfolio of portfolios" [value]="portfolio">
                      {{ portfolio.portfolioName }} - ${{ portfolio.totalValue | number:'1.2-2' }}
                    </option>
                  </select>
                </div>
                <div class="col-md-4">
                  <button class="btn btn-primary w-100">
                    <i class="fas fa-plus me-2"></i>
                    New Portfolio
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">
                <i class="fas fa-info-circle me-2"></i>
                Portfolio Overview
              </h5>
            </div>
            <div class="card-body" *ngIf="selectedPortfolio">
              <div class="row text-center">
                <div class="col-4">
                  <h6 class="text-muted">Total Value</h6>
                  <h4 class="text-primary">${{ selectedPortfolio.totalValue | number:'1.2-2' }}</h4>
                </div>
                <div class="col-4">
                  <h6 class="text-muted">Currency</h6>
                  <h4>{{ selectedPortfolio.baseCurrency }}</h4>
                </div>
                <div class="col-4">
                  <h6 class="text-muted">Created</h6>
                  <h4>{{ selectedPortfolio.createdAt | date:'shortDate' }}</h4>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Dashboard Components -->
      <div class="row" *ngIf="selectedPortfolio">
        <div class="col-12">
          <app-dashboard [portfolio]="selectedPortfolio"></app-dashboard>
        </div>
      </div>
    </div>
  </div>
</div>
