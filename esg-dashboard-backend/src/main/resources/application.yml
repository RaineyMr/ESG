spring:
  application:
    name: esg-portfolio-dashboard
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/esg_portfolio_db
    username: esg_user
    password: esg_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  sql:
    init:
      mode: always
  
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  
  cache:
    type: simple
    cache-names:
      - portfolios
      - holdings
      - esg-scores
      - risk-metrics

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on-param

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    git:
      mode: full

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  paths-to-match: /api/**

logging:
  level:
    com.morganstanley.esg: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.transaction: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/esg-dashboard.log

---
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/esg_portfolio_db
    username: esg_user
    password: esg_password
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  sql:
    init:
      mode: always

logging:
  level:
    com.morganstanley.esg: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/esg_portfolio_db}
    username: ${DATABASE_USER:esg_user}
    password: ${DATABASE_PASSWORD:esg_password}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  sql:
    init:
      mode: never

logging:
  level:
    com.morganstanley.esg: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    root: INFO

---
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:tc:postgresql:15:///testdb
    username: test
    password: test
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  sql:
    init:
      mode: always

logging:
  level:
    com.morganstanley.esg: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
